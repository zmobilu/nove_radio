<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hodiny</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" href="data:,">
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: -apple-system-short-condensed, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; height: 100vh; width: 100vw; overflow: hidden;
            -webkit-user-select: none; user-select: none; }

        /* --- REŽIM RÁDIO --- */
        .clock-section { flex: 1.5; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-right: 1px solid #222; transition: all 0.5s ease-in-out; position: relative; }
        
        #time { font-size: 24vw; line-height: 0.8; letter-spacing: -4px; display: flex; align-items: baseline; 
                  transform: scaleY(1.05); transform-origin: center; }
        .hours-part { font-weight: 600; color: #ffffff; } 
        .minutes-part { font-weight: 200; color: #ffffff; margin-left: 5px; } 
        .red-digit { color: #eb0028 !important; } 
        .blue-digit { color: #307CEB !important; }
        
        /* Štýl pre info riadok v rádio režime */
        .radio-info-wrapper { display: flex;  align-items: center;  gap: 12px; margin-top: 10px;  font-size: 3.5vw; font-weight: 300; color: #aaa;}
        .radio-info-wrapper .separator { color: #222; font-weight: 200; }
        
        #radio-name { font-weight: 400; text-transform: uppercase; }
        #weather-temp-mini { margin-top: 0 !important; }
        
        .ss-only { display: none !important; }

        #spotify-links-container { display: none; margin-top: 15px; width: 85%; background: #0a0a0a; border-radius: 12px; padding: 10px; border: 1px solid #222; }
        /* Štýl pre nový kontajner RTVS pod-rádií */
        #slovensko-links-container { display: none; flex-direction: row; justify-content: center;  gap: 20px; margin-top: 25px; width: 90%; } /* <-- Táto zátvorka tu je */

/* Štýl pre samotné malé štvorcové tlačidlá s logami */
.sub-btn { 
    width: 65px; 
    height: 65px; 
    background: #000; 
    border: 1px solid #222; 
    border-radius: 6px; 
    cursor: pointer; 
    padding: 0; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    overflow: hidden;
}

.sub-btn img { 
    width: 100%; 
    height: 100%; 
    object-fit: contain; 
}

/* Keď sa pod-rádio prehráva, získa výrazný biely okraj */
.sub-btn.playing { 
    border: 2px solid #fff !important; 
}
        .buttons-section { flex: 1.1; display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: 0.7fr 1fr 1fr; gap: 8px; padding: 10px; background: #050505; }
        
        /* Štýl na skrytie/zobrazenie konkrétnej strany rádií v gride */
        .page-group { display: contents; }
        .page-group.hidden { display: none !important; }

        .btn { display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; /* Poistka, aby logo nepretieklo von */
              border: none; background: #151515; color: white; border-radius: 18px; cursor: pointer; font-size: 14px; }
        .vypni { background-color: #333; grid-column: span 2; }
        .vypni i { color: #eb0028; font-size: 65px; }
        .spotify { background-color: #198c47; }
        .spotify i { font-size: 60px; }
        .playing { border: 2px solid #fff !important; }

        /* Navigačné tlačidlá stránky */
        .btn-nav { background-color: #222; color: #ff9f0a; font-weight: bold; }
        .btn-nav i { font-size: 30px; margin-bottom: 5px; color: #ff9f0a; }

        /* --- ŠETRIČ (METEOSTANICA) --- */
        body.screensaver-mode .buttons-section { display: none; }
        body.screensaver-mode .ss-hide { display: none !important; }
        body.screensaver-mode #fun-links-container { display: none !important; } 
        body.screensaver-mode .ss-only { display: flex !important; }
        body.screensaver-mode .clock-section { flex: 1; border: none; display: grid; grid-template-columns: 1.3fr 0.7fr; align-items: stretch; }

        .ss-left-col { display: flex; flex-direction: column; justify-content: flex-start !important; align-items: center; border-right: 1px solid #1a1a1a; padding: 0; width: 100%; }
        body.screensaver-mode #time { font-size: 32vw; transform: scaleY(1.30); letter-spacing: -1vw; margin-top: 8vh; }
        
        #date-block { 
            display: flex; 
            align-items: flex-end; 
            justify-content: space-between; 
            width: 100%; 
            box-sizing: border-box; 
            margin-top: auto; 
            margin-bottom: 3.5vh; 
            padding-left: 2vw; 
            padding-right: 2vw; 
        }

        .ss-separator {
            color: #222; 
            font-size: 5.5vw;
            font-weight: 200;
            line-height: 1;
            position: relative;
            top: 0.5vw;
        }

        #date-display { 
            line-height: 1; 
            color: #ffffff;
            position: relative;
            top: 1.4vw;
        }

        .ss-date-wrapper { 
            display: flex; 
            align-items: flex-end; 
            gap: 15px; 
        }

        .ss-date { font-size: 14vw; font-weight: 300; color: #fff; line-height: 1; }

        .ss-day { 
            font-size: 5.0vw; 
            font-weight: 500; 
            text-transform: uppercase; 
            text-align: left; 
            line-height: 1; 
            max-width: 35vw; 
            white-space: normal; 
            display: inline-block; 
            transform: scaleY(2.2); 
            transform-origin: bottom; 
            position: relative;
            top: 0.6vw;
        }

        /* Farby pre meniny */
        .name-female { color: #FFB6C1 !important; } 
        .name-male { color: #87CEEB !important; }    
        
        .name-moje { color: #FFFF00 !important; }       
        .name-family { color: #FF8C00 !important; }     
        .name-colleagues { color: #00CED1 !important; } 
        .name-classmates { color: #32CD32 !important; } 
        
        /* Názov hrajúceho rádia v šetriči - absolútne poziciovaný */
#ss-radio-info {
    position: absolute;
    bottom: 26vh; /* Zvýšené z 21vh, aby to naisto vyskočilo z textu menín */
    left: 0;
    width: 100%;
    font-size: 4.0vw;
    font-weight: 400;
    color: #ff9f0a;
    text-transform: uppercase;
    letter-spacing: 2px;
    display: none;
    justify-content: center;
    align-items: center;
    pointer-events: none;
}
body.screensaver-mode #ss-radio-info { display: flex !important; }
        
        .ss-right-col { display: flex; flex-direction: column; justify-content: space-between !important; align-items: center; background: #000; padding: 0; }
        .current-weather-group { margin-top: 4vh; text-align: center; }
        .meteo-icon-large { font-size: 15vw; margin-bottom: 5px; }
        .sub-info-row { display: flex; justify-content: center; gap: 14px; width: 100%; transform: scaleX(1.2) scaleY(0.8); transform-origin: center; margin-top: -2px; }
        .temp-val { font-size: 14vw; font-weight: 300; line-height: 0.9; color: #fff; }
        .hum-val { font-size: 6.5vw; font-weight: 200; color: #aaa; letter-spacing: 1px; opacity: 0.8; white-space: nowrap; }

        #mini-forecast-strip { display: flex; flex-direction: row !important; flex-wrap: nowrap; justify-content: space-around; width: 100%; border-top: 1px solid #222; padding-top: 1vh; margin-bottom: 3.5vh; }
        .mini-item { display: flex; flex-direction: column; align-items: center; width: 48%; }
        .mini-day { font-size: 1.8vw; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .mini-icon { font-size: 6vw; }
        .mini-temp { font-size: 4.5vw; font-weight: 300; color: #fff; white-space: nowrap; }
    </style>
</head>

            <button onclick="playRadio('https://icecast.stv.livebox.sk/slovensko_128.mp3', this, 'slovensko')" class="btn rozhlas" style="background:#00547E;"><img src="LogoSRo.png" style="max-width:80%; max-height:70%; object-fit:contain;"></button>
            <button onclick="playRadio('https://stream.funradio.sk/fun128.mp3', this, 'fun')" class="btn fun" style="background:#ffffff;"><img src="LogoFunRadio.png" style="max-width:75%; max-height:70%; object-fit:contain;"></button>
            <button onclick="playRadio('https://stream.bauermedia.sk/rock-hi.mp3', this, 'rock')" class="btn rock" style="background:#000000;"><img src="LogoAntenaROCK.png" style="max-width:70%; max-height:60%; object-fit:contain;"></button>

    <script>
  // GLOBÁLNA MAPA HLASITOSTÍ
const VOLUME_MAP = { 
    'slovensko': 0.3, 
    'fun': 1.0, 
    'rock': 0.5,
    'fm': 0.3,
    'devin': 0.3,
    'litera': 0.3,
    'regina': 0.3,
    // NOVÉ SUB-RÁDIÁ FUN RÁDIA:
    'funchill': 1.0,
    'funczsk': 1.0,
    'funrunning': 1.0,
    'fun8090': 1.0
};
    
    const RODINA = ['Dominik', 'Janka', 'Patrik', 'Martin', 'Andrea', 'Roman', 'Emília', 'Ján', 'Mária', 'Juraj', 'Tatiana', 'Rastislav', 'Viktor', 'Adela', 'Linda', 'Michal', 'Ondrej', 'Jana', 'Viliam', 'Nataša', 'Kristína', 'Tibor', 'Ema'];
    const KOLEGOVIA = ['Ivana', 'Mária', 'Iveta', 'Nina', 'Adriana', 'Jaroslava', 'Eva', 'Jana', 'Judita', 'Martin', 'Jozef', 'Marcel', 'Karol', 'Anna', 'Petra', 'Dominika'];
    const SPOLUZIACI = ['Claudia', 'Bibiana','Zuzana', 'Kristína','Hana', 'Amanda','Viktória', 'Karin','Alexandra', 'Vanesa','Tamara', 'Zoe','Ela', 'Ema','Sebastian', 'Barbora','Jakub', 
                        'Paula', 'Timothy', 'Maximilián','Adam', 'Milica','Alica', 'Linda', 'Róbert', 'Daniel','Laura', 'Lili', 'Oskar', 'Tomáš','Samuel','Maxim','Alex','Erik','Oliver'];
    const MOJE_MENA = ['Peter', 'Lenka', 'Daniel', 'Hana', 'Lucia', 'Katarína', 'Andrej', 'Zuzana', 'Radoslav', 'Martina', 'Róbert', 'Milan', 'Juraj', 'Ladislav', 'Pavol']; 
    const WEATHER_CODES = { 0: 'fa-sun', 1: 'fa-cloud-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud', 45: 'fa-smog', 48: 'fa-smog', 51: 'fa-cloud-rain', 61: 'fa-cloud-showers-heavy', 71: 'fa-snowflake', 95: 'fa-bolt' };
    const WEATHER_COLORS = { 0: '#ffcc00', 1: '#ffdb58', 2: '#aaa', 3: '#888', 45: '#777', 51: '#4dabff', 61: '#007bff', 71: '#fff', 95: '#ffeb3b' };
    
    function getTempColor(t) {
        if (t < 0) return '#00bfff';
        if (t < 10) return '#87CEEB';
        if (t < 22) return '#98FB98';
        if (t < 28) return '#ffa500';
        return '#ff4500';
    }

    let dnesneMeno = ""; 
    let poslednyDatumMenin = ""; // Tu si uložíme dátum, kedy sme naposledy stiahli CSV

    async function updateNameday() {
        const now = new Date();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const targetDate = `${mm}-${dd}`; // formát "05-31" pro vyhľadávanie v CSV
        const dnesnyFormatnyDatum = `${now.getDate()}.${now.getMonth() + 1}.`; // formát "31.5." pre našu kontrolu

        // KONTROLA: Ak sme dnes už meniny úspešne stiahli, nepokračuj ďalej
        if (poslednyDatumMenin === dnesnyFormatnyDatum && dnesneMeno !== "") {
            return; 
        }
        try {
            const url = 'https://raw.githubusercontent.com/spacek/slovensky-kalendar-menin/master/sk-meniny.csv';
            const response = await fetch(url);
            if (!response.ok) throw new Error('Súbor nedostupný');
            const text = await response.text();
            const lines = text.split('\n');
            let found = "";
            
            for (let line of lines) {
                if (line.includes(targetDate)) {
                    const parts = line.split(/[;,]/);
                    if (parts.length > 1) {
                        found = parts[1].trim();
                    }
                    break;
                }
            }
            dnesneMeno = found;
        // Ak sme úspešne našli meno, zapíšeme si dnešný dátum, aby sme už nefetchovali
            if (dnesneMeno !== "") {
                poslednyDatumMenin = dnesnyFormatnyDatum;
            }
        } catch (e) { 
            console.log("Chyba menín:", e); 
            dnesneMeno = ""; 
        }
    }

    updateNameday();
    setInterval(updateNameday, 3600000);

    function updateClock() {
        const now = new Date();
        let h = String(now.getHours()).padStart(2, '0');
        let m = String(now.getMinutes()).padStart(2, '0');
        
        // JEDNA SPOLOČNÁ PODMIENKA PRE OBIDVE CIFRY
        let h_display = h;
        if (h[0] === '1') {
            h_display = `<span class="red-digit">1</span>${h.substring(1)}`;
        } else if (h[0] === '2') {
            h_display = `<span class="blue-digit">2</span>${h.substring(1)}`;
        }
        
        document.getElementById('h-part').innerHTML = h_display;
        document.getElementById('m-part').textContent = m;
        
        const formattedDate = `${now.getDate()}.${now.getMonth() + 1}.`;
        document.getElementById('date-display').textContent = formattedDate;
        document.getElementById('radio-date').textContent = formattedDate;
        
        const menoElementSS = document.getElementById('day-display');
        const menoElementRadio = document.getElementById('radio-name');
        
        if (menoElementSS) menoElementSS.textContent = dnesneMeno;
        if (menoElementRadio) menoElementRadio.textContent = dnesneMeno;

        if (dnesneMeno) {
            const listyTried = [menoElementSS, menoElementRadio];
            const menoLower = dnesneMeno.toLowerCase().trim();

            listyTried.forEach(el => {
                if (!el) return;
                
                el.classList.remove('name-female', 'name-male', 'name-moje', 'name-family', 'name-colleagues', 'name-classmates');
                el.style.color = '';

                const skontroluj = (zoznam) => zoznam.some(m => m.toLowerCase().trim() === menoLower);

                if (skontroluj(RODINA)) {
                    el.classList.add('name-family');
                } 
                else if (skontroluj(MOJE_MENA)) {
                    el.classList.add('name-moje');
                } 
                else if (skontroluj(KOLEGOVIA)) {
                    el.classList.add('name-colleagues');
                } 
                else if (skontroluj(SPOLUZIACI)) {
                    el.classList.add('name-classmates');
                } 
                else {
                    const poslednePismeno = menoLower.slice(-1);
                    const vynimky = ['gejza', 'attila', 'boba'];

                    if (poslednePismeno === 'a' && !vynimky.includes(menoLower)) {
                        el.classList.add('name-female');
                    } else {
                        el.classList.add('name-male');
                    }
                }
            });
        }
    }

    setInterval(updateClock, 1000); updateClock();
    
    async function updateWeather() {
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=48.1421&longitude=17.1964&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe%2FBratislava&wind_speed_unit=kmh`);
            const d = await r.json();
            const rawTemp = d.current.temperature_2m;
            const rawApparent = d.current.apparent_temperature; 
            const currentTemp = Math.round(rawTemp) + '°C';
            const currentHum = Math.round(d.current.relative_humidity_2m) + '%';
            const currentCode = d.current.weather_code;
            const tColor = getTempColor(rawTemp);
            const appColor = getTempColor(rawApparent);

            document.getElementById('weather-temp-mini').textContent = currentTemp;
            document.getElementById('weather-temp-mini').style.color = tColor;
            document.getElementById('outdoor-temp').textContent = currentTemp;
            document.getElementById('outdoor-temp').style.color = tColor;
            document.getElementById('apparent-temp').textContent = Math.round(rawApparent) + '°';
            document.getElementById('apparent-temp').style.color = appColor; 
            document.getElementById('outdoor-hum').textContent = currentHum;

            const windSpeed = Math.round(d.current.wind_speed_10m);
            const windDir = d.current.wind_direction_10m;
            document.getElementById('wind-speed').textContent = windSpeed + ' km/h';
            document.getElementById('wind-icon').style.transform = `rotate(${windDir}deg)`;

            const mainIconEl = document.getElementById('weather-icon-main');
            mainIconEl.className = 'fas ' + (WEATHER_CODES[currentCode] || 'fa-cloud') + ' meteo-icon-large';
            mainIconEl.style.color = WEATHER_COLORS[currentCode] || '#aaa';

            for (let i = 0; i <= 1; i++) {
                const code = d.daily.weather_code[i];
                const max = d.daily.temperature_2m_max[i];
                const min = Math.round(d.daily.temperature_2m_min[i]);
                document.getElementById(`fc${i}-temp`).innerHTML = `<span style="color:${getTempColor(max)}">${Math.round(max)}°</span> <span style="color:#aaa; font-size:0.8em">/ ${min}°</span>`;
                const iconEl = document.getElementById(`fc${i}-icon`);
                iconEl.className = 'fas ' + (WEATHER_CODES[code] || 'fa-cloud') + ' mini-icon';
                iconEl.style.color = WEATHER_COLORS[code] || '#aaa';
            }
        } catch (e) { console.log("Chyba počasia:", e); }
    }
    updateWeather(); setInterval(updateWeather, 600000);

    // --- AUDIO LOGIKA PREHRÁVANIA ---
    const audio = document.getElementById('audioPlayer');
    function playRadio(url, element, type) {
    // 1. Ak klikáme na hlavné rádio (má triedu .btn), zrušíme označenie ostatných hlavných tlačidiel
    if (element.classList.contains('btn')) {
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
        element.classList.add('playing');
    } else {
        // 2. Ak klikáme na malé pod-rádio (trieda .sub-btn), zrušíme označenie len medzi malými tlačidlami
        document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('playing'));
        element.classList.add('playing');
    }
    
    // 3. LOGIKA PRE ZOBRAZENIE POD-RÁDIÍ: 
    const slovenskoContainer = document.getElementById('slovensko-links-container');
    const funContainer = document.getElementById('fun-links-container');

    // Ak hrá Slovensko alebo jeho pod-okruhy
    if (['slovensko', 'fm', 'devin', 'litera', 'regina'].includes(type)) {
        slovenskoContainer.style.display = 'flex';
        funContainer.style.display = 'none';
        if (element.classList.contains('btn')) {
            document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('playing'));
        }
    }
    // Ak hrá hlavné Fun Rádio alebo ktorékoľvek z jeho nových pod-rádií
    else if (['fun', 'funchill', 'funczsk', 'funrunning', 'fun8090'].includes(type)) {
        funContainer.style.display = 'flex';
        slovenskoContainer.style.display = 'none';
        if (element.classList.contains('btn')) {
            document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('playing'));
        }
    }
    // Ak hrá Rock, Spotify alebo vypneš rádio
    else {
        slovenskoContainer.style.display = 'none';
        funContainer.style.display = 'none';
        document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('playing'));
    }

    // Na úplný koniec funkcie playRadio sa do šetriča pošle pekný názov:
    document.getElementById('ss-radio-info').textContent = type;
            
    // Skryjeme Spotify kontajner, ak by bol náhodou otvorený
    document.getElementById('spotify-links-container').style.display = 'none';
    
    audio.volume = VOLUME_MAP[type] || 1.0;
    audio.src = url; 
    audio.play();
    resetIdleTimer();
    // Na koniec funkcie playRadio:
    document.getElementById('ss-radio-info').textContent = type;// Na úplný koniec funkcie playRadio namiesto pôvodného riadku daj tento:
    document.getElementById('ss-radio-info').innerHTML = `<small style="font-size: 0.6em; opacity: 0.7; text-transform: none; margin-right: 8px;">hrá:</small>${type}`;
}
    
    function stopRadio() {
    audio.pause(); audio.src = "";
    document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('playing'));
    document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('playing')); // Vyčistí malé tlačidlá
    document.getElementById('spotify-links-container').style.display = 'none';
    document.getElementById('slovensko-links-container').style.display = 'none'; // Skryje pod-rádiá
    document.getElementById('fun-links-container').style.display = 'none';
    resetIdleTimer();
    // Na koniec funkcie stopRadio:
    document.getElementById('ss-radio-info').textContent = "";
}
    
    function showSpotify() {
    stopRadio();
    document.getElementById('slovensko-links-container').style.display = 'none'; // Skryje RTVS pod-rádiá
    document.getElementById('spotify-links-container').style.display = 'block';
    document.getElementById('fun-links-container').style.display = 'none';
    document.querySelector('.spotify').classList.add('playing');
    resetIdleTimer();
        // Na koniec funkcie showSpotify:
    document.getElementById('ss-radio-info').textContent = "SPOTIFY";
    // Na úplný koniec funkcie showSpotify namiesto pôvodného riadku daj tento:
    document.getElementById('ss-radio-info').innerHTML = `<small style="font-size: 0.6em; opacity: 0.7; text-transform: none; margin-right: 8px;">hrá:</small>SPOTIFY`;
}
    
    function openSpotify(id) {
        let url = id === 'search' ? "https://open.spotify.com/search" : `https://open.spotify.com/playlist/${id}`;
        window.location.href = url; 
    }

    function changePage(pageNumber) {
        if (pageNumber === 1) {
            document.getElementById('page-1').classList.remove('hidden');
            document.getElementById('page-2').classList.add('hidden');
            document.getElementById('radio-label').textContent = 'Radio 1';
        } else {
            document.getElementById('page-1').classList.add('hidden');
            document.getElementById('page-2').classList.remove('hidden');
            document.getElementById('radio-label').textContent = 'Radio 2';
        }
        document.getElementById('spotify-links-container').style.display = 'none';
        document.getElementById('slovensko-links-container').style.display = 'none'; // Skryje lištu pri zmene strany
        document.getElementById('fun-links-container').style.display = 'none';
        resetIdleTimer();
    }

    // --- REŽIM ŠETRIČA OBRAZOVKY ---
    let idleTimer;
    function resetIdleTimer() {
        document.body.classList.remove('screensaver-mode');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => document.body.classList.add('screensaver-mode'), 20000);
    }
    document.addEventListener('touchstart', resetIdleTimer);
    resetIdleTimer();

    function klikNaHodiny(e) {
    if (e) {
        e.stopPropagation();
        if (e.cancelable) e.preventDefault(); // <-- TENTO RIADOK TU CHÝBA
    }
    if (document.body.classList.contains('screensaver-mode')) {
        resetIdleTimer();
    } else {
        clearTimeout(idleTimer);
        document.body.classList.add('screensaver-mode');
    }
}
    </script>
